name: Daily Fortune Scraper

on:
  schedule:
    # 한국 시간(KST) 오전 6:15분 실행 (UTC 기준 21:15)
    - cron: '15 21 * * *'
  workflow_dispatch: # 버튼을 눌러 수동으로도 실행 가능하게 함

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 deepl gspread oauth2client selenium webdriver-manager supabase

    - name: 크롤러 실행
      env:
        # GitHub Secrets에서 가져올 변수들
        DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        SHEET_ID: ${{ secrets.SHEET_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
      run: python main.py