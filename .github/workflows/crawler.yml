name: Daily Ohasa Crawler

on:
  schedule:
    # UTC 기준 21:00가 한국 시간(KST) 오전 6:00 입니다.
    - cron: '0 21 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      # 💡 문제의 requirements.txt를 무시하고, 여기서 직접 4개만 깔끔하게 설치합니다!
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager deepl supabase

    - name: Run crawler
      # 💡 파이썬 코드가 깃허브 비밀금고(Secrets)에서 키를 꺼내 쓸 수 있도록 연결!
      env:
        DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python main.py
